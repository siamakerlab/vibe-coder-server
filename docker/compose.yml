name: vibe-coder

# ──────────────────────────────────────────────────────────────────────────
# v0.14.0 — PostgreSQL 전환.
#
# 이전 v0.13.x 까지는 server 컨테이너 하나에 SQLite 가 박혀 있었음. v0.14.0
# 부터는 postgres 사이드카 컨테이너가 영구 데이터를 보관.
#
# 통합 데이터 디렉토리 (./vibe-coder-data) 안에:
#   vibe-coder-data/
#     ├── workspace/      ← 프로젝트 소스 / APK
#     ├── postgres/       ← PG 데이터 (v0.14.0 신규)
#     ├── server/         ← 로그 / 빌드 메타
#     ├── dev-tools/      ← Android SDK / Gradle / MCP / Playwright / 설정
#     └── claude/         ← Claude OAuth 자격증명 / MCP 등록 정보
#
# `tar czf backup.tar.gz vibe-coder-data/` 한 줄 백업 그대로 유효.
#
# 기존 SQLite 사용자: docs/migration/sqlite-to-postgres.md (P6) 참고.
# ──────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: ${VIBECODER_POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: vibe-coder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VIBECODER_DB_NAME:-vibecoder}
      POSTGRES_USER: ${VIBECODER_DB_USER:-vibecoder}
      # 비밀번호는 .env 의 VIBECODER_DB_PASSWORD 로 반드시 지정.
      # docker compose 가 빈 값에서 그대로 부팅 시도하면 postgres 가 거절하므로,
      # 다음 줄에서 누락된 비밀번호를 명시적으로 검출.
      POSTGRES_PASSWORD: ${VIBECODER_DB_PASSWORD:?VIBECODER_DB_PASSWORD must be set in .env}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VIBECODER_DB_USER:-vibecoder} -d ${VIBECODER_DB_NAME:-vibecoder}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # 기본은 외부 노출 X (server 컨테이너만 같은 docker network 안에서 접근).
    # 호스트에서 직접 psql 로 접속하고 싶다면 .env 에 VIBE_PG_PORT=5432 등 설정 후 주석 해제.
    # ports:
    #   - "${VIBE_PG_PORT:-5432}:5432"

  vibe-coder-server:
    # 로컬 빌드 (개발자용)
    build:
      context: ..
      dockerfile: docker/Dockerfile

    # Docker Hub 배포 사용자는 위 build: 블록 대신 image: 만 사용
    image: ${VIBECODER_IMAGE:-siamakerlab/vibe-coder-server:latest}

    container_name: vibe-coder-server
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    # 호스트 UID/GID 매칭 → 마운트된 볼륨의 파일 소유권 충돌 방지
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Seoul}

      # JVM 힙 (호스트 RAM 보고 조정).
      # v1.5.2 — -Duser.timezone 명시로 Java/Kotlin DateTime 클래스가 컨테이너
      # TZ 와 일관 동작. Claude `/usage` 의 reset 시각 (예: "Resets 10:20pm
      # (Asia/Seoul)") 과 server-side timestamp / DB UTC 변환 일관성 유지.
      JAVA_OPTS: ${JAVA_OPTS:--Xmx2g -XX:+UseG1GC -Dfile.encoding=UTF-8 -Duser.timezone=${TZ:-Asia/Seoul}}

      # 첫 실행 시 admin 자동 생성 (선택). 미지정 시 /admin/setup 화면.
      VIBECODER_ADMIN_USERNAME: ${VIBECODER_ADMIN_USERNAME:-}
      VIBECODER_ADMIN_PASSWORD: ${VIBECODER_ADMIN_PASSWORD:-}

      # CORS 허용 host (v0.12.0+) — 콤마 구분. 기본 `*` = anyHost.
      # 외부 origin 노출 시엔 신뢰 origin 만 명시 (예: "https://my-app.example.com").
      VIBECODER_CORS_ALLOWED_HOSTS: ${VIBECODER_CORS_ALLOWED_HOSTS:-*}
      VIBECODER_CORS_ALLOW_CREDENTIALS: ${VIBECODER_CORS_ALLOW_CREDENTIALS:-false}

      # 신뢰 리버스 프록시 뒤 배포 시 true 권장 (X-Forwarded-For 로 실제 클라 IP 식별
      # → IP 차단/rate-limit 정확 동작). 직노출(LAN)에서 true 면 X-Forwarded-For 스푸핑으로
      # IP 차단 우회 가능하므로 반드시 신뢰 프록시 뒤에서만 켤 것.
      VIBECODER_TRUST_FORWARDED_FOR: ${VIBECODER_TRUST_FORWARDED_FOR:-false}

      # 세션 idle timeout(분). 0=무제한(LAN 단일 사용자 기본). 외부 노출 시 양수 권장
      # (미사용/탈취 토큰 수명 제한). 마지막 요청 후 N분 idle 이면 토큰 폐기 + 재로그인.
      VIBECODER_SECURITY_SESSION_IDLE_TIMEOUT_MINUTES: ${VIBECODER_SECURITY_SESSION_IDLE_TIMEOUT_MINUTES:-0}

      # v0.14.0 — PostgreSQL 연결. host 는 같은 docker network 안의 service 이름.
      VIBECODER_DB_HOST: ${VIBECODER_DB_HOST:-postgres}
      VIBECODER_DB_PORT: ${VIBECODER_DB_PORT:-5432}
      VIBECODER_DB_NAME: ${VIBECODER_DB_NAME:-vibecoder}
      VIBECODER_DB_USER: ${VIBECODER_DB_USER:-vibecoder}
      VIBECODER_DB_PASSWORD: ${VIBECODER_DB_PASSWORD:?VIBECODER_DB_PASSWORD must be set in .env}
      VIBECODER_DB_MAX_POOL: ${VIBECODER_DB_MAX_POOL:-10}
      VIBECODER_DB_SSLMODE: ${VIBECODER_DB_SSLMODE:-disable}

      # v0.77.0 — SSR 기본 언어. 사용자 별 설정 없을 때 fallback.
      #   허용 값: en, ko. 기본 en (CLAUDE.md §5 공개 문서 영문 표준).
      #   사용자는 Settings → General → Language 에서 본인 언어 선택.
      VIBECODER_DEFAULT_LANGUAGE: ${VIBECODER_DEFAULT_LANGUAGE:-en}

      # v1.33.0 — 서버 로그 디렉토리. 이전엔 logback 상대경로 + cwd=/workspace 라서
      #   /workspace/vibe-coder-server-data/logs 에 로그가 쌓여 프로젝트 목록에 섞였음.
      #   server 볼륨(/data)으로 분리 — workspace 밖. (logback.xml 의 LOG_DIR property)
      VIBECODER_LOG_DIR: ${VIBECODER_LOG_DIR:-/data/logs}

      # 선택 기능: SSH 서버 카드가 저장한 포트 파일이 기본값. 이 env를 명시하면
      # 파일보다 우선한다(컨테이너 포트도 바꾸는 고급 설정).
      VIBECODER_SSH_PORT: ${VIBECODER_SSH_PORT:-}

    # LAN 페어링 / admin 웹 / API 모두 같은 포트
    # v1.40.0 — 무선 ADB(/adb) 자동 탐지(mDNS)가 필요하면 compose.host.yml 오버레이로
    #   HOST 네트워크 사용: docker compose -f compose.yml -f compose.host.yml up -d
    ports:
      - "${VIBE_PORT:-17880}:17880"
      # 선택 기능: /env-setup "SSH 서버" 카드 설치 후 `ssh -p ${VIBE_SSH_PORT:-2222} vibe@<host>`.
      # 공개 인터넷에 노출하기 전 방화벽/공유기 접근 제어와 SSH authorized_keys 를 확인할 것.
      - "${VIBE_SSH_PORT:-2222}:${VIBECODER_SSH_PORT:-2222}"

    # ────────────────────────────────────────────────────────────────────
    # 볼륨 — v0.7.0 통합 구조 (v0.14.0 에서 SQLite 경로 제거, PG 는 자체 컨테이너)
    #
    # ${VIBE_DATA_ROOT:-./vibe-coder-data}/ 한 디렉토리 안에 모든 영구 데이터.
    # 처음 실행 시 호스트에 빈 디렉토리들이 자동 생성되고, doctor/MCP 가
    # 그 안을 채워 넣습니다. 이미지 교체와 무관하게 보존됩니다.
    # ────────────────────────────────────────────────────────────────────
    volumes:
      # 프로젝트 소스 + 빌드 산출물 (호스트 IDE 와 직접 공유 가능)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/workspace:/workspace

      # 서버 영속 데이터 (로그 / 빌드 메타). v0.13.x 까지 SQLite 도 여기였으나
      # v0.14.0 부터는 postgres 컨테이너로 이전 — 본 디렉토리는 로그용으로 축소.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/server:/data

      # ── dev-tools — 한 부모 아래로 모은 빌드 환경 도구들 ───────────
      # Android SDK (3~4GB, doctor 가 채움)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/android-sdk:/opt/android-sdk
      # Gradle 의존성 캐시 (1~2GB, 첫 빌드 시 채워짐)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/gradle:/home/vibe/.gradle
      # vibe 의 npm 글로벌 prefix — MCP `npm install -g <pkg>` 가 여기에 떨어짐
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/npm-global:/home/vibe/.local
      # npx / npm 다운로드 캐시
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/npm-cache:/home/vibe/.npm
      # Playwright 브라우저 (Playwright MCP 사용 시 ~300MB)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/playwright:/home/vibe/.cache/ms-playwright
      # 기타 도구 설정 (claude-code, npm config 등)
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/config:/home/vibe/.config
      # v1.2.0 — SSH 키 (vibe-coder 가 git clone/push 시 사용). 첫 부팅 시
      # entrypoint 가 ED25519 키쌍 자동 생성. 이미 있으면 절대 덮어쓰지 않음 →
      # 서버 업데이트 시 동일 키 유지. 설정 → SSH Key 에서 공개키 복사.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/ssh:/home/vibe/.ssh
      # v1.5.0 — Android 앱 키스토어 보관. 설정 → Keystores 에서 패키지명 별로
      # release / debug / properties / admob 파일 생성. 영속 유지 — 키스토어
      # 분실은 Play Store 업로드 영구 차단.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/keystores:/home/vibe/keystores
      # v1.7.25 — Android Gradle 의 default debug.keystore 영속. 영속 안 하면
      # 컨테이너 재시작마다 fingerprint 가 바뀌어 같은 packageName 의 기존
      # 설치 앱과 cert 불일치 → INSTALL_FAILED_UPDATE_INCOMPATIBLE.
      # 호스트 PC 의 ~/.android/debug.keystore 를 이 디렉토리에 복사해두면
      # 호스트 / 컨테이너 빌드가 같은 debug cert 공유.
      - ${VIBE_DATA_ROOT:-./vibe-coder-data}/dev-tools/android:/home/vibe/.android

      # ── Claude 인증 ─────────────────────────────────────────────
      # 기본: 통합 디렉토리 안의 vibe-coder-data/claude/.
      # 호스트의 ~/.claude 와 공유하고 싶으면 .env 에서
      #   VIBE_CLAUDE_DIR=~/.claude
      # 으로 override.
      - ${VIBE_CLAUDE_DIR:-./vibe-coder-data/claude}:/home/vibe/.claude

    # 헬스체크: /health 엔드포인트
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:17880/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

    # v1.73.0 — 헤드리스 안드로이드 에뮬레이터(Claude Code 로그분석용) KVM 가속.
    # /dev/kvm 노출만 하면 entrypoint 가 device 의 실제 GID 로 kvm 그룹을 만들어 vibe 를
    # 추가한다(호스트마다 kvm GID 가 달라 group_add 하드코딩 대신 동적 처리). 없으면
    # 에뮬레이터가 매우 느려 부팅 실패 가능(서버 /emulator 페이지가 안내). 미사용 시 생략 가능.
    devices:
      - /dev/kvm:/dev/kvm
    #   - /dev/bus/usb:/dev/bus/usb   # USB 케이블 ADB 사용 시 추가

# v0.14.0 — named volume 미사용. 모든 영구 데이터는 ./vibe-coder-data/ 안의 bind mount.
# postgres 데이터도 ./vibe-coder-data/postgres/ 디렉토리 — 백업/이전 시 같은 트리.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vibe.fullname" . }}-workspace
  labels: {{- include "vibe.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.workspace.storage }}
{{- if .Values.workspace.storageClassName }}
  storageClassName: {{ .Values.workspace.storageClassName }}
{{- end }}

{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vibe.fullname" . }}-postgres
  labels: {{- include "vibe.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
{{- if .Values.postgres.storageClassName }}
  storageClassName: {{ .Values.postgres.storageClassName }}
{{- end }}
{{- end }}

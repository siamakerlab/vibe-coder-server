{{- if .Values.postgres.enabled }}
{{- if not .Values.postgres.password }}
{{- fail "postgres.password is required when postgres.enabled=true. Set via --set postgres.password=<value>." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibe.fullname" . }}-pg-secret
  labels: {{- include "vibe.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  VIBECODER_DB_PASSWORD: {{ .Values.postgres.password | quote }}
{{- end }}

{{- if .Values.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibe.fullname" . }}-env-secret
  labels: {{- include "vibe.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.secretEnv }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}

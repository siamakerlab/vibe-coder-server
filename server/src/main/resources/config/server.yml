server:
  name: Vibe Coder Server
  host: 0.0.0.0
  port: 17880
  version: 1.165.0

workspace:
  # Each project lives at <root>/<projectId>/.
  # Metadata (logs/builds/artifacts/uploads/patches) lives at <root>/.vibecoder/<projectId>/.
  # Override at launch with --workspace <path>.
  root: ./workspace
  maxUploadSizeMb: 100
  artifactKeepCount: 20
  uploadDeniedExtensions:
    - exe
    - bat
    - cmd
    - ps1
    - sh

security:
  pairingEnabled: true
  pairingCodeExpireMinutes: 10
  allowRawShell: false
  # v1.6.0 — Workspace terminal (사이드바 글로벌 메뉴 /terminal — v1.27.0). 컨테이너
  # 안 bash PTY 를 WebSocket 으로 노출 — vim/tmux/less 등 interactive 명령 사용 가능.
  # v1.6.1 — 기본 true. 컨테이너 자체 sandbox + admin 인증 가드 두 단계로 충분
  # 안전. raw shell (호스트-level) 과 달리 컨테이너 안 vibe 사용자 권한 안에서만
  # 작동. 외부 노출 환경에서 비활성화하려면 false 로 설정.
  # v1.27.1 — false 라도 SSR /terminal 만은 "비활성화됨" 안내 페이지로 등록되어
  # 사이드바 메뉴 클릭이 404 가 되지 않음. REST/WS 만 미등록.
  allowTerminal: true
  # v0.26.0 — Bearer 토큰 / 웹 세션 idle timeout (분). 0 = 무제한 (default).
  # 마지막 요청 후 N 분 idle 이면 토큰 자동 폐기 + 401.
  # v0.96.0 — Android client (Bearer 토큰) 가 백그라운드에서 idle 후 재진입 시
  # 자동 로그아웃되던 UX 문제 회수. 0 = 무제한이 default (LAN 단일 사용자
  # 도구 특성상 안전). 외부 노출 시 30~60 분 권장.
  sessionIdleTimeoutMinutes: 0
  # v1.144.7 — 터미널(PTY) 세션 idle reaper 유예 (분). 0 = 무제한(reaper 비활성).
  # 다른 화면(메뉴)으로 가면 WebSocket 은 끊겨도 PTY bash 는 서버에 상주 → 돌아오면
  # 재attach + scrollback replay 로 "이어서 작업". WS 가 하나라도 연결돼 있으면(보고
  # 있으면) 이 값과 무관하게 절대 회수하지 않는다. WS 가 끊긴 세션만 이 시간 초과 시 정리.
  # 이전(~v1.144.6)엔 30분 하드코딩이라 다른 작업을 30분 넘게 하고 돌아오면 세션이
  # 사라져 "완전 새 터미널"로 초기화됐다. 기본 1440(24h). LAN 단일 사용자라 PTY 1개
  # (≈수 MB)를 길게 살려도 부담 작다. 완전 무제한은 0.
  terminalIdleTimeoutMinutes: 1440
  # Project console provider TUI sessions keep provider-native CLI processes alive. They are
  # heavier than the generic bash terminal, so disconnected idle sessions are reaped sooner by
  # default. Active browser connections are never reaped. 0 = unlimited.
  consoleTuiIdleTimeoutMinutes: 120
  # v1.28.0 — 신뢰 리버스 프록시 뒤 배포 시 X-Forwarded-For 로 실제 클라이언트 IP
  # 식별. true 면 XForwardedHeaders 설치 → IP 차단/rate-limit 이 프록시 IP 가 아닌
  # 실제 클라 IP 기준으로 동작. 운영(openresty→localhost:17880)에서는 true 권장.
  # 직노출(LAN) 환경에서 true 면 X-Forwarded-For 스푸핑으로 IP 차단 우회 가능하므로
  # 반드시 신뢰 프록시 뒤에서만 켤 것. compose 의 VIBECODER_TRUST_FORWARDED_FOR
  # env 로도 override 가능.
  trustForwardedFor: false

claude:
  enabled: true
  path: auto
  timeoutMinutes: 60
  autoBuildAfterTask: false
  # v1.106.0 / v1.107.2 — 프로젝트별 모델 미설정 시의 전역 기본. claude --model <model> 전달.
  # "default" = --model 미전달 → CLI 가 자체 설정/계정 기본으로 모델을 직접 선택(기본값).
  # "sonnet"(Opus 대비 약 1/5 사용량) / "opus" / "fable"(Claude Fable 5 — 최상위, Opus 2배 비용,
  # CLI 2.1.17x+ alias) / "haiku" / 전체 모델 ID(claude-fable-5 등) 도 가능.
  # 모델은 프로젝트별로 콘솔 콤보박스에서 개별 관리(.vibecoder/claude-model)되며 선택값이 고정 표시.
  # env VIBECODER_CLAUDE_MODEL 로도 덮어쓸 수 있음.
  model: default
  # v1.106.0 — 직전 turn 컨텍스트(cache_read)가 이 토큰을 넘으면 콘솔 경고 + 자동 재개 보류.
  # 1M 상한까지 누적되어 매 turn 전체 맥락을 과금하는 것을 사용자가 인지/리셋하도록 유도.
  # 0 이하 = 비활성. env VIBECODER_CLAUDE_CONTEXT_WARN_TOKENS 로 override.
  contextWarnTokens: 350000
  # v1.108.0 — 자동 /compact 임계(직전 turn cache_read 토큰). 프로젝트별 auto-compact(기본 ON)이고
  # 컨텍스트가 이 값을 넘으면 turn 종료 후 자동으로 /compact 실행 후 이어감(Claude CLI 자동 compact 동형).
  # 0 이하 = 비활성. env VIBECODER_CLAUDE_AUTO_COMPACT_TOKENS 로 override.
  # v1.123.1 — 700K→500K. 더 일찍/자주 compact 해 컨텍스트를 작게 유지(step당 cacheRead 누적↓).
  autoCompactTokens: 500000
  # v1.123.0 — 2단계 경고의 CRITICAL(2차) 임계. contextWarnTokens(1차)보다 강한 문구 +
  # 즉시 '새 세션' 권장. 0 이하 = 비활성. env VIBECODER_CLAUDE_CONTEXT_CRITICAL_TOKENS.
  contextCriticalTokens: 600000
  # v0.21.0 — 사용량 모니터링 + 임계치 이메일 알림.
  # enabled=false 면 폴링/알림 둘 다 끔. pollIntervalMinutes 너무 짧으면
  # claude /status 호출 비용↑. warnThresholdPercent 도달 시 1회 + critical 도달 시
  # 1회 transition 기반 발송 (재발송 방지 10분 cooldown).
  usage:
    enabled: true
    pollIntervalMinutes: 5
    warnThresholdPercent: 80
    criticalThresholdPercent: 95
    scratchOnly: true

codex:
  # 프로젝트별 모델 미설정 시 Codex CLI 기본 모델 사용. "default" = --model 미전달.
  # 프로젝트별 선택값은 .vibecoder/codex-model 에 저장된다.
  model: default
  # v1.147.0 — 사용량 모니터링 + 임계치 알림 (claude.usage 와 대칭).
  # Codex usage 는 session(5h)/weekly(7d) 두 게이지로 오며, 임계치 판정은 둘 중 큰 값 기준.
  # warnThresholdPercent 도달 시 1회 + critical 도달 시 1회 transition 기반 발송 (10분 cooldown).
  usage:
    enabled: true
    pollIntervalMinutes: 5
    warnThresholdPercent: 80
    criticalThresholdPercent: 95

# v1.150.0 — Phase 2 OpenCode provider. `opencode run --format json` 1회성 exec 모델 (Codex 와 동일).
# model: 프로젝트별 미설정 시 기본. "default" = -m 미전달. "zai-coding-plan/glm-5.2" 형식 권장.
# configHome: OPENCODE_CONFIG_HOME override. "default" = ~/.config/opencode.
# zai.enforceCodingPlan (v1.153.0): true 면 OpenCode provider 를 z.ai coding plan 구독 경로로 고정.
#   OPENCODE_CONFIG_HOME 을 서버 통제 격리 디렉토리로 설정 → z.ai-only config 노출.
#   커스텀 provider 무시 + zai-coding-plan/* 외 모델은 FALLBACK_ZAI_MODEL(glm-5.2) 로 대체.
#   env VIBECODER_ZAI_ENFORCE_CODING_PLAN=true 로도 활성화.
opencode:
  # 기본 모델 — z.ai coding plan 의 GLM 계열. v1.156.0 기본 glm-5.2 (variant=max).
  # 프로젝트별 선택값은 .vibecoder/opencode-model 에 저장.
  # env VIBECODER_OPENCODE_MODEL 로 override.
  model: zai-coding-plan/glm-5.2
  # OPENCODE_CONFIG_HOME override. "default" = ~/.config/opencode.
  # env VIBECODER_OPENCODE_CONFIG_HOME.
  configHome: default
  # opencode 실행 경로. "auto" 면 OPENCODE_CMD env → opencode.
  # env VIBECODER_OPENCODE_CMD.
  cmd: auto
  # v1.156.0 — reasoning effort (--variant). high/max/minimal. 프로젝트별값은 opencode-variant.
  variant: max
  zai:
    enforceCodingPlan: false
    baseUrl: default

build:
  timeoutMinutes: 30
  defaultDebugTask: assembleDebug

git:
  enabled: true
  path: auto

# CORS 정책 (v0.12.0+).
# `*` 가 포함되면 anyHost — LAN 격리 환경 기본값. 외부 origin 노출 시엔
# 신뢰 origin 만 명시 (CSRF 보호). compose.yml 의 VIBECODER_CORS_ALLOWED_HOSTS
# env (콤마 구분) 가 있으면 server.yml 보다 우선.
#
# 형식 예:
#   "*"                            anyHost (모든 origin 허용)
#   "example.com"                  http + https 둘 다 허용
#   "https://example.com"          https 만
#   "http://example.com:8080"      포트 명시
#   "*.example.com"                wildcard subdomain
cors:
  allowedHosts:
    - "*"
  allowCredentials: false

# v0.14.0 — PostgreSQL 연결.
# 운영에서는 비밀번호를 server.yml 에 직접 쓰지 말고 환경변수 또는 secret 파일로:
#   VIBECODER_DB_PASSWORD       (compose .env)
#   VIBECODER_DB_PASSWORD_FILE  (Docker secret, 우선)
# host/port/name 도 env override 가능 (VIBECODER_DB_HOST 등).
# sslMode: disable | prefer | require | verify-ca | verify-full
database:
  host: postgres
  port: 5432
  name: vibecoder
  user: vibecoder
  password: ""
  passwordFile: ""
  maxPoolSize: 10
  sslMode: disable

# v0.27.0 — Slack / Discord / Telegram webhook 알림.
# 비활성 (enabled=false) 또는 모든 provider URL 비면 silent skip. 활성 provider 만 발송.
# SSRF 방어: Slack 은 hooks.slack.com, Discord 는 discord.com / discordapp.com 만 허용.
# Telegram bot token 은 정규식 (^\d+:[A-Za-z0-9_-]+$) 검증.
webhook:
  enabled: false
  slackUrl: ""
  discordUrl: ""
  telegramBotToken: ""
  telegramChatId: ""

resources:
  # Memory-heavy child processes (Claude/Codex/OpenCode/Gradle/Flutter) are blocked before
  # the container reaches OOM. Soft pressure only triggers idle cleanup; blocking is reserved
  # for hard pressure or the free-memory floor. Docker compose should still set a hard cgroup
  # memory limit.
  enabled: true
  memorySoftLimitPercent: 88
  memoryHardLimitPercent: 96
  minFreeMemoryMb: 768
  killIdleTuiSessionsOnPressure: true

ios:
  agent:
    enabled: false
    # local = MacBook local install, ssh = remote macOS agent.
    mode: local
    host: ""
    port: 22
    user: ""
    workspaceRoot: ""
    xcodePath: auto

# v0.77.0 — Phase 64 i18n. SSR 다국어 fallback.
# 사용자 별 언어 설정 (Settings → General → Language) 이 없을 때 적용.
# Docker compose 의 VIBECODER_DEFAULT_LANGUAGE env 로 override 가능.
#   허용 값: en, ko
i18n:
  defaultLanguage: en

# v1.5.0 — Android 앱 키스토어 관리. /settings/keystores 페이지에서 패키지명별로
# release/debug/properties/admob 파일 자동 생성. 파일은
# /home/vibe/keystores/ (볼륨 영속) 에 저장. 본 섹션의 default 값들이 폼에
# 미리 채워짐 — 운영자가 패키지명만 입력하면 즉시 생성 가능.
#
# 보안: defaultPassword 는 평문이라 server.yml 에 직접 쓰지 말고 환경변수
# VIBECODER_KEYSTORE_DEFAULT_PASSWORD 또는 secret 파일로 주입 권장. 비어있으면
# 폼에서 매번 사용자가 입력 필수.
keystore:
  defaults:
    name: "Jangwook Lee"
    organization: "Sia Makerlab"
    unit: "Mobile"
    country: "KR"
    state: "Chungbuk"
    city: "Jecheon"
    defaultPassword: ""
    validityYears: 100

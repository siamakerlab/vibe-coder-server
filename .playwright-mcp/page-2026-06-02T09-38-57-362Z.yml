 TZ 와 무관하게 일관. today_yymmdd=$(TZ=Asia/Seoul date +\"%y%m%d\") current_yymmdd=\"${current_code:0:6}\" current_rrr=\"${current_code:6:3}\" if [[ \"$current_yymmdd\" == \"$today_yymmdd\" ]]; then next_rrr=$(printf \"%03d\" $((10#$current_rrr + 1))) else next_rrr=\"001\" fi new_code=\"${today_yymmdd}${next_rrr}\" # ─────────────────────── versionName 계산 ─────────────────────── if $keep_name; then new_name=\"$current_name\" elif [[ \"$mode\" == \"set\" ]]; then if [[ ! \"$set_to\" =~ ^v[0-9]+\\.[0-9]+\\.[0-9]+$ ]]; then echo \"✘ --set 값은 v<major>.<minor>.<patch> 형식이어야 합니다: '$set_to'\" >&2 exit 2 fi new_name=\"$set_to\" else bare=\"${current_name#v}\" IFS=. read -r major minor patch <<<\"$bare\" case \"$mode\" in patch) patch=$((patch + 1));; minor) minor=$((minor + 1)); patch=0;; major) major=$((major + 1)); minor=0; patch=0;; esac new_name=\"v${major}.${minor}.${patch}\" fi # ─────────────────────── 파일 갱신 ─────────────────────── tmpfile=\"$(mktemp)\" awk -v new_code=\"$new_code\" -v new_name=\"$new_name\" ' /^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*[0-9]+/ { sub(/[0-9]+/, new_code) } /^[[:space:]]*versionName[[:space:]]*=[[:space:]]*\"/ { sub(/\"[^\"]+\"/, \"\\\"\" new_name \"\\\"\") } { print } ' \"$GRADLE_FILE\" > \"$tmpfile\" mv \"$tmpfile\" \"$GRADLE_FILE\" echo \"✓ versionCode $current_code → $new_code\" echo \"✓ versionName $current_name → $new_name\""

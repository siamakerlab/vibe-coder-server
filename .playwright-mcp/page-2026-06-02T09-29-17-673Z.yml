          - generic [ref=e620]: "#!/usr/bin/env bash # tools/bump-version.sh # Sia Makerlab 버전 정책 (CLAUDE.md §3) 에 따라 versionCode/versionName 자동 갱신. # # versionCode = yymmddrrr (날짜 + 일일 리비전 카운터) # - 오늘 날짜와 같은 yymmdd → rrr +1 # - 날짜가 바뀌었으면 rrr = 001 으로 초기화 # versionName = v<major>.<minor>.<patch> # - tier 판단은 Claude 에게 위임 (사용자 지시). # · major: 호환성 깨짐 # · minor: 새 기능 / 새 모듈 # · patch: 그 외 (기본) # - 자세한 기준: CLAUDE.md §3.1 # # Usage: # ./tools/bump-version.sh # patch (대부분의 변경) # ./tools/bump-version.sh --minor # 새 기능/새 모듈 # ./tools/bump-version.sh --major # 호환성 깨짐 # ./tools/bump-version.sh --set v1.2.3 # 지정값 # ./tools/bump-version.sh --keep-name # versionName 유지 (예외) set -euo pipefail ROOT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")/..\" && pwd)\" GRADLE_FILE=\"$ROOT_DIR/app/build.gradle.kts\" if [[ ! -f \"$GRADLE_FILE\" ]]; then echo \"✘ build.gradle.kts 를 찾을 수 없습니다: $GRADLE_FILE\" >&2 exit 1 fi mode=\"patch\" set_to=\"\" keep_name=false while [[ $# -gt 0 ]]; do case \"$1\" in --patch) mode=\"patch\"; shift;; --minor) mode=\"minor\"; shift;; --major) mode=\"major\"; shift;; --set) mode=\"set\"; set_to=\"${2:-}\"; shift 2;; --keep-name) keep_name=true; shift;; -h|--help) grep -E '^# ' \"$0\" | sed 's/^# \\{0,1\\}//' exit 0;; *) echo \"알 수 없는 옵션: $1\" >&2; exit 2;; esac done # 현재 값 추출 (POSIX 호환: \\s 대신 [[:space:]]) current_code=$(grep -E '^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*[0-9]+' \"$GRADLE_FILE\" | head -1 | sed -E 's/.*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\\1/') current_name=$(grep -E '^[[:space:]]*versionName[[:space:]]*=[[:space:]]*\"' \"$GRADLE_FILE\" | head -1 | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\\1/') if [[ -z \"${current_code:-}\" || -z \"${current_name:-}\" ]]; then echo \"✘ 현재 versionCode/versionName 을 추출하지 못했습니다.\" >&2 exit 1 fi # ─────────────────────── versionCode 계산 ─────────────────────── # Asia/Seoul (KST) 기준 — UTC 사용 시 KST 자정 직후 (00:00~08:59) 에 yymmdd 가 전날로 # 기록되어 Play Console 정렬이 깨짐. 명시적 TZ 로 사용자 위치/컨테이너 TZ 와 무관하게 일관. today_yymmdd=$(TZ=Asia/Seoul date +\"%y%m%d\") current_yymmdd=\"${current_code:0:6}\" current_rrr=\"${current_code:6:3}\" if [[ \"$current_yymmdd\" == \"$today_yymmdd\" ]]; then next_rrr=$(printf \"%03d\" $((10#$current_rrr + 1))) else next_rrr=\"001\" fi new_code=\"${today_yymmdd}${next_rrr}\" # ─────────────────────── versionName 계산 ─────────────────────── if $keep_name; then new_name=\"$current_name\" elif [[ \"$mode\" == \"set\" ]]; then if [[ ! \"$set_to\" =~ ^v[0-9]+\\.[0-9]+\\.[0-9]+$ ]]; then echo \"✘ --set 값은 v<major>.<minor>.<patch> 형식이어야 합니다: '$set_to'\" >&2 exit 2 fi new_name=\"$set_to\" else bare=\"${current_name#v}\" IFS=. read -r major minor patch <<<\"$bare\" case \"$mode\" in patch) patch=$((patch + 1));; minor) minor=$((minor + 1)); patch=0;; major) major=$((major + 1)); minor=0; patch=0;; esac new_name=\"v${major}.${minor}.${patch}\" fi # ─────────────────────── 파일 갱신 ─────────────────────── tmpfile=\"$(mktemp)\" awk -v new_code=\"$new_code\" -v new_name=\"$new_name\" ' /^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*[0-9]+/ { sub(/[0-9]+/, new_code) } /^[[:space:]]*versionName[[:space:]]*=[[:space:]]*\"/ { sub(/\"[^\"]+\"/, \"\\\"\" new_name \"\\\"\") } { print } ' \"$GRADLE_FILE\" > \"$tmpfile\" mv \"$tmpfile\" \"$GRADLE_FILE\" echo \"✓ versionCode $current_code → $new_code\" echo \"✓ versionName $current_name → $new_name\""
